apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api-app
  namespace: devops-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rest-api-app
  template:
    metadata:
      labels:
        app: rest-api-app
    spec:
      containers:
      - name: rest-api-app
        image: isji/rest-api-demo:BUILD_NUMBER_PLACEHOLDER
        ports:
        - containerPort: 8080
        # readinessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 8080
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        # livenessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 8080
        #   initialDelaySeconds: 60
        #   periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: rest-api-app-service
  namespace: devops-tools
spec:
  selector:
    app: rest-api-app
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP