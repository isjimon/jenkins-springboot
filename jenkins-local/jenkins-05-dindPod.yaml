apiVersion: v1
kind: Pod
spec:
  containers:
  - name: docker
    image: docker:24.0.9-dind
    securityContext:
      privileged: true
    env:
    - name: DOCKER_TLS_CERTDIR
      value: ""
    volumeMounts:
    - name: docker-storage
      mountPath: /var/lib/docker
  - name: shell
    image: isji/jenkins-agent:latest
    env:
    - name: DOCKER_HOST
      value: tcp://localhost:2375
    command:
    - sleep
    args:
    - "9999999"
  - name: podman                         
    image: quay.io/podman/stable:latest
    command:
    - sleep
    args:
    - "9999999"
    securityContext:
      privileged: true                    # required for podman in k8s
    volumeMounts:
    - name: podman-storage
      mountPath: /var/lib/containers     # podman's image storage
  volumes:
  - name: docker-storage
    emptyDir: {}
  - name: podman-storage                 
    emptyDir: {}